name: Build AML Mod
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup NDK
        uses: nttld/setup-ndk@v1.5.0
        with:
          ndk-version: r25c
      - name: Build
        run: |
          CC=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang++
          $CC -std=c++17 -shared -fPIC -O2 -DNDEBUG -s \
            -DIMGUI_IMPL_OPENGL_ES2 \
            -I. -Iimgui \
            -o libMyFirstMod.so \
            main.cpp \
            imgui/imgui.cpp \
            imgui/imgui_draw.cpp \
            imgui/imgui_tables.cpp \
            imgui/imgui_widgets.cpp \
            imgui/imgui_impl_opengl3.cpp \
            -llog -lEGL -lGLESv2 -ldl -static-libstdc++
      - uses: actions/upload-artifact@v4
        with:
          name: libMyFirstMod
          path: libMyFirstMod.so
